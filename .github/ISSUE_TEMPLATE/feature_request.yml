name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] <short description>"
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Tell us what you'd like to see in SNI.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that SNI currently can't do, or does poorly?
      placeholder: |
        I want to download episodes for offline viewing, but SNI only supports
        streaming. I have to fall back to yt-dlp separately.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What's your proposed solution?
      description: Describe how you'd like SNI to behave. Be as specific as you can.
      placeholder: |
        Add a `sni download "one piece" -e 1-12` command that uses yt-dlp under
        the hood to save episodes to ~/Videos/anime/.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve this, and why they don't work for you.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      multiple: true
      options:
        - CLI (`sni play`, `sni search`, etc.)
        - TUI (`sni tui`)
        - Providers (allanime, hianime, animepahe)
        - Player (mpv/VLC integration)
        - Configuration
        - Installation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I've searched existing issues to make sure this isn't a duplicate
          required: true
