name: Stale issues + PRs

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:  # Allow manual triggering

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues: mark stale after 60 days of inactivity, close 14 days after that
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: |
            This issue has been inactive for 60 days and is being marked as stale.
            If this is still relevant, please comment to keep it open — otherwise
            it will be auto-closed in 14 days.
          close-issue-message: |
            This issue was auto-closed after 14 days of inactivity following the
            stale label. If the problem still exists, please open a new issue
            with the latest SNI version info.

          # PRs: mark stale after 30 days, close 14 days after that
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: |
            This PR has been inactive for 30 days and is being marked as stale.
            If you're still working on this, please push an update or comment —
            otherwise it will be auto-closed in 14 days.
          close-pr-message: |
            This PR was auto-closed after 14 days of inactivity following the
            stale label. Feel free to reopen if you pick it back up.

          # Never auto-mark these labels as stale
          exempt-issue-labels: "pinned,security,good-first-issue,help wanted,bug,enhancement,needs-triage"
          exempt-pr-labels: "pinned,security,WIP"

          # Only consider issues/PRs that haven't been touched at all
          operations-per-run: 30
