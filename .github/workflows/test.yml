name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatchling
          pip install -e ".[test]"

      - name: Run tests
        run: pytest --cov=sni --cov-report=term-missing

      - name: Lint
        run: ruff check sni/

  shellcheck:
    name: Shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          additional_paths: install.sh

      - name: Verify install.sh syntax
        run: bash -n install.sh

  psscriptanalyzer:
    name: PSScriptAnalyzer install.ps1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          # Run PSScriptAnalyzer. We treat Error severity as failures and
          # print Warning severities as informational (PSAvoidUsingWriteHost
          # etc. are stylistic and don't affect functionality for an installer
          # script whose whole job is interactive console output).
          $results = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error, Warning
          $errors = $results | Where-Object { $_.Severity -eq 'Error' }
          $warnings = $results | Where-Object { $_.Severity -eq 'Warning' }

          if ($warnings) {
            Write-Host "PSScriptAnalyzer warnings (informational):"
            $warnings | Format-Table -AutoSize
          }
          if ($errors) {
            Write-Host "PSScriptAnalyzer errors (must fix):"
            $errors | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($errors.Count) error(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no errors. $($warnings.Count) warning(s) (informational)."
