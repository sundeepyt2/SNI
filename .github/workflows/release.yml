name: Release

on:
  release:
    types: [published]

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install hatchling
          python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  binary:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build binary
        run: pyinstaller --onefile --name sni --hidden-import sni.tui.app sni/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sni-${{ matrix.os }}
          path: dist/sni*
