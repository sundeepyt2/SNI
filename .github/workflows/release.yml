name: Release

on:
  release:
    types: [published]

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Verify package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  binary:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Required to upload assets to the GitHub release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: sni-linux
          - os: macos-latest
            asset_name: sni-macos
          - os: windows-latest
            asset_name: sni-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build binary
        run: pyinstaller --onefile --name sni --hidden-import sni.tui.app sni/cli.py

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv dist/sni "dist/${{ matrix.asset_name }}"
          ls -la dist/

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item dist/sni.exe "dist/${{ matrix.asset_name }}"
          Get-ChildItem dist/

      - name: Upload artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
